name = "modparks"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# カスタムワーカースクリプト (Cron 対応のため OpenNext の worker をラップ)
main = "worker-wrapper.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }

[triggers]
# 式は worker-wrapper.js の CRON_ROUTES のキーと一致させること
crons = [
  "0 * * * *", # 毎時0分: 外部サービスとの同期
  "0 3 * * *", # 毎日 03:00 UTC: 自動バックアップ（アプリ設定で既定は無効）
]

[[d1_databases]]
binding        = "DB"
database_name  = "modparks-db"
database_id = "7a0b941a-b8f4-47b7-97fb-428a126c96a2"
migrations_dir = "drizzle"

[[kv_namespaces]]
binding = "SETTINGS_KV"
id = "75c45e724c144cc18b629dd2dca50a7e"

# JAR 解析サイドカー。jszip はこちらにのみ存在する（本体の 3 MiB 制限対策）
[[services]]
binding = "JAR"
service = "modparks-jar"

# WebAuthn 検証サイドカー。@simplewebauthn/server(gzip ~125 KiB)はこちらにのみ
# 存在する（本体の 3 MiB 制限対策）
[[services]]
binding = "AUTH"
service = "modparks-auth"

[[r2_buckets]]
bucket_name = "modparks-storage"
binding = "modparks_storage"
# binding     = "R2"
# bucket_name = "modparks-files"

# ─── 環境変数 ─────────────────────────────────────────────────────────────────
[vars]
NEXTAUTH_URL       = "https://modparks.pitan76.net"
AUTH_URL           = "https://modparks.pitan76.net"
AUTH_TRUST_HOST    = "true"
NEXT_PUBLIC_APP_URL = "https://modparks.pitan76.net"
NEXT_PUBLIC_RECIPE_CDN_URL = "https://recipe.modparks.pitan76.net"
USE_RECIPE_CDN_API = "true"
GITHUB_CONFIG_REPO = "Pitan76/ModParks"
CLOUDFLARE_ACCOUNT_ID = "70a9b16c9396a3ab84c4ce7719800373"
