name = "modparks"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# メインワーカースクリプト（@opennextjs/cloudflare が生成）
main = ".open-next/worker.js"

# ─── D1 Database ───────────────────────────────────────────────────────────────
[[d1_databases]]
binding        = "DB"
database_name  = "modparks-db"
database_id    = "YOUR_D1_DATABASE_ID"   # wrangler d1 create modparks-db で取得
migrations_dir = "drizzle"

# ─── R2 Buckets ───────────────────────────────────────────────────────────────
[[r2_buckets]]
binding     = "R2"
bucket_name = "modparks-files"

# ─── 環境変数 ─────────────────────────────────────────────────────────────────
[vars]
NEXTAUTH_URL       = "http://localhost:3000"
NEXT_PUBLIC_APP_URL = "http://localhost:3000"

# ─── 本番環境 ─────────────────────────────────────────────────────────────────
[env.production.vars]
NEXTAUTH_URL        = "https://modparks.pages.dev"
NEXT_PUBLIC_APP_URL = "https://modparks.pages.dev"
