name = "modparks"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# カスタムワーカースクリプト (Cron 対応のため OpenNext の worker をラップ)
main = "worker-wrapper.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }

[triggers]
crons = ["0 * * * *"] # 毎時0分に実行

[[d1_databases]]
binding        = "DB"
database_name  = "modparks-db"
database_id = "7a0b941a-b8f4-47b7-97fb-428a126c96a2"
migrations_dir = "drizzle"

[[kv_namespaces]]
binding = "SETTINGS_KV"
id = "75c45e724c144cc18b629dd2dca50a7e"

[[r2_buckets]]
bucket_name = "modparks-storage"
binding = "modparks_storage"
# binding     = "R2"
# bucket_name = "modparks-files"

# ─── 環境変数 ─────────────────────────────────────────────────────────────────
[vars]
NEXTAUTH_URL       = "https://modparks.pitan76.net"
AUTH_URL           = "https://modparks.pitan76.net"
AUTH_TRUST_HOST    = "true"
NEXT_PUBLIC_APP_URL = "https://modparks.pitan76.net"
NEXT_PUBLIC_RECIPE_CDN_URL = "https://recipe.modparks.pitan76.net"
USE_RECIPE_CDN_API = "true"
GITHUB_CONFIG_REPO = "Pitan76/ModParks"
