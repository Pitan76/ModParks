name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_jar:
        description: "サイドカー(JAR worker)も強制デプロイする"
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # サイドカー（JAR worker）に変更があるかを判定する
      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            jar:
              - 'workers/jar/**'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build OpenNext
        run: npx opennextjs-cloudflare build
        env:
          # デプロイ間で Server Action の暗号鍵を固定する（ビルド時に焼き込まれる）
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}
          # Turbopack だと Server バンドルが 3 MiB を超えるため CI では webpack ビルドを使う
          CF_WEBPACK_BUILD: "1"

      # メイン Worker が Service Binding するため、先にサイドカーを配置する
      # サイドカー自体に変更があったときだけ再デプロイする（それ以外は既存のものを再利用）
      - name: Deploy JAR worker
        if: steps.changes.outputs.jar == 'true' || inputs.deploy_jar == true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.100.0"
          workingDirectory: workers/jar
          command: deploy

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.100.0"
          command: deploy
